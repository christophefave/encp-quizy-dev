    // 2. INITIALISATION
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 3. FONCTION POUR ENVOYER LE SCORE
    window.submitFirebaseScore = async (entry) => {
        try {
            await db.collection("highscores").add({
                prenom: entry.prenom,
                promo: entry.promo,
                ville: entry.ville,
                time: entry.time,
                subject: entry.subject,
                date: firebase.firestore.FieldValue.serverTimestamp()
            });
            await refreshHighScores(); // Recharge les scores après l'envoi
        } catch (e) {
            console.error("Erreur Firebase : ", e);
        }
    };

    // 4. FONCTION POUR RÉCUPÉRER LES SCORES
    window.refreshHighScores = async () => {
        const snapshot = await db.collection("highscores").orderBy("time", "asc").get();
        const scores = {};
        snapshot.forEach(doc => {
            const data = doc.data();
            if (!scores[data.subject]) scores[data.subject] = [];
            scores[data.subject].push(data);
        });
        window.firebaseHighScores = scores;
    };

    // Charger les scores au démarrage
    window.refreshHighScores();

        // --- GESTION DES MENUS DÉROULANTS ---
        function toggleDropdown(id) {
            ['file', 'theme'].forEach(otherId => {
                if (otherId !== id) {
                    const otherOptions = document.getElementById(`options-${otherId}`);
                    const otherChevron = document.getElementById(`chevron-${otherId}`);
                    if (otherOptions && !otherOptions.classList.contains('invisible')) {
                        otherOptions.classList.add('invisible', 'opacity-0', '-translate-y-2');
                        if (otherChevron) otherChevron.classList.remove('rotate-180');
                    }
                }
            });

            const options = document.getElementById(`options-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (options) {
                if (options.classList.contains('invisible')) {
                    options.classList.remove('invisible', 'opacity-0', '-translate-y-2');
                    if (chevron) chevron.classList.add('rotate-180');
                } else {
                    options.classList.add('invisible', 'opacity-0', '-translate-y-2');
                    if (chevron) chevron.classList.remove('rotate-180');
                }
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown')) {
                ['file', 'theme'].forEach(id => {
                    const options = document.getElementById(`options-${id}`);
                    const chevron = document.getElementById(`chevron-${id}`);
                    if (options && !options.classList.contains('invisible')) {
                        options.classList.add('invisible', 'opacity-0', '-translate-y-2');
                        if (chevron) chevron.classList.remove('rotate-180');
                    }
                });

        });

        // --- ÉTAT DE L'APPLICATION ---
        window.state = {
            view: 'home', // 'home', 'training', 'test', 'challenge', 'results', 'training_results', 'challenge_form', 'high_scores'
            quizMode: null, // 'training', 'test', 'challenge'
            allQuestions: [],
            filteredQuestions: [],
            currentQuestionIndex: 0,
            userAnswers: {},
            showFeedback: false,
            selectedFile: 'anatomie.json',
            selectedSubTheme: 'Toutes',
            subThemes: ['Toutes'],
            trainingStats: { answered: 0, correct: 0 },
            challengeStartTime: null,
            challengeEndTime: null,
            challengeTime: null,
            currentScore: null,
            lastChallengeEntry: null
        };
        // Pour compatibilité avec le code existant
        let state = window.state;

        function saveState() {
            const stateToSave = {
                view: state.view,
                quizMode: state.quizMode,
                filteredQuestions: state.filteredQuestions,
                currentQuestionIndex: state.currentQuestionIndex,
                userAnswers: state.userAnswers,
                showFeedback: state.showFeedback,
                selectedFile: state.selectedFile,
                selectedSubTheme: state.selectedSubTheme,
                trainingStats: state.trainingStats,
                challengeStartTime: state.challengeStartTime,
                challengeEndTime: state.challengeEndTime,
                challengeTime: state.challengeTime,
                currentScore: state.currentScore,
                lastChallengeEntry: state.lastChallengeEntry
            };
            sessionStorage.setItem('quizy_state', JSON.stringify(stateToSave));
        }

        function loadState() {
            // Nettoyage de l'ancien localStorage si présent
            localStorage.removeItem('quizy_state');
            
            const saved = sessionStorage.getItem('quizy_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    Object.assign(state, parsed);
                    
                    // Reset challenge if refreshed during challenge to prevent cheating
                    if (state.view === 'challenge') {
                        state.view = 'challenge_intro';
                        state.challengeStartTime = null;
                        state.challengeEndTime = null;
                        state.challengeTime = null;
                        state.currentQuestionIndex = 0;
                        state.userAnswers = {};
                        state.currentScore = null;
                    }
                    
                    return true;
                } catch (e) {
                    console.error("Erreur de lecture du state", e);
                }
            }
            return false;
        }

        // --- ANIMATION ---
        function triggerAnimation() {
            const app = document.getElementById('app');
            app.classList.remove('fade-in');
            void app.offsetWidth; // trigger reflow
            app.classList.add('fade-in');
        }

        // --- CHARGEMENT DES DONNÉES ---
        async function loadData() {
            try {
                // Tente de charger le fichier JSON depuis le dossier 'data'
                // Le chemin relatif 'data/...' fonctionne parfaitement sur Github Pages
                // Ajout d'un cache buster pour forcer le rechargement si le fichier a été modifié
                const res = await fetch('data/' + state.selectedFile + '?t=' + new Date().getTime());
                if (!res.ok) throw new Error('Fichier introuvable');
                state.allQuestions = await res.json();
            } catch (error) {
                console.warn('Utilisation des données intégrées de secours.', error);
                // Si le fetch échoue (ex: ouverture locale file:// ou fichier manquant), on utilise les données de secours
                state.allQuestions = fallbackData;
            }
            
            // Ajout d'une majuscule au début des sous-thématiques pour tous les fichiers
            state.allQuestions = state.allQuestions.map(q => {
                if (q.sous_thematique) {
                    q.sous_thematique = q.sous_thematique.split(/,(?!\s*suppléments et dopage)/).map(t => {
                        let trimmed = t.trim();
                        return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
                    }).join(', ');
                }
                return q;
            });
            
            // Extraction des sous-thématiques uniques
            const themes = new Set();
            state.allQuestions.forEach(q => {
                if (q.sous_thematique) {
                    q.sous_thematique.split(/,(?!\s*suppléments et dopage)/).forEach(t => themes.add(t.trim()));
                }
            });
            state.subThemes = ['Toutes', ...Array.from(themes).sort()];
            
            if (!state.subThemes.includes(state.selectedSubTheme)) {
                state.selectedSubTheme = 'Toutes';
            }
            
            render();
        }

        async function handleFileChange(file) {
            state.selectedFile = file;
            state.selectedSubTheme = 'Toutes';
            await loadData();
            saveState();
        }

        function handleThemeChange(theme) {
            state.selectedSubTheme = theme;
            saveState();
            render();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- LOGIQUE DU QUIZ ---
        let timerInterval = null;

        function startChallengeTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const timerElement = document.getElementById('challenge-timer');
                if (timerElement && state.challengeStartTime) {
                    const elapsed = Date.now() - state.challengeStartTime;
                    timerElement.innerHTML = formatChallengeTime(elapsed);
                } else if (!timerElement) {
                    // Stop timer if we are no longer in the challenge view
                    clearInterval(timerInterval);
                }
            }, 100);
        }

        function formatChallengeTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            const tenths = Math.floor((ms % 1000) / 100);
            return `${minutes}:${seconds}.${tenths}`;
        }

        function prepareChallenge() {
            state.view = 'challenge_intro';
            state.quizMode = 'challenge';
            saveState();
            render();
            triggerAnimation();
        }

        function startQuiz(mode) {
            state.quizMode = mode;
            let questions = [...state.allQuestions];
            
            // Filtrage par sous-thématique
            if (mode !== 'challenge' && state.selectedSubTheme !== 'Toutes') {
                questions = questions.filter(q => q.sous_thematique.includes(state.selectedSubTheme));
            }
            
            // Mélange des questions (Fisher-Yates)
            shuffleArray(questions);
            
            // Mode Challenge : sélection de 20 questions avec quotas de difficulté
            if (mode === 'challenge') {
                const faciles = questions.filter(q => q.niveau === 'facile');
                const inters = questions.filter(q => q.niveau === 'intermédiaire');
                const difficiles = questions.filter(q => q.niveau === 'difficile');
                
                // Quotas: 6 faciles, 6 intermédiaires, 8 difficiles
                const selectedFaciles = faciles.slice(0, 6);
                const selectedInters = inters.slice(0, 6);
                const selectedDifficiles = difficiles.slice(0, 8);
                
                questions = [...selectedFaciles, ...selectedInters, ...selectedDifficiles];
                
                // Si on n'a pas assez de questions pour atteindre 20, on complète
                if (questions.length < 20) {
                    const usedIds = new Set(questions.map(q => q.question));
                    const remaining = [...state.allQuestions].filter(q => !usedIds.has(q.question));
                    shuffleArray(remaining);
                    questions = [...questions, ...remaining.slice(0, 20 - questions.length)];
                }
                
                // Remélanger les 20 questions sélectionnées
                shuffleArray(questions);
            } else if (mode === 'test') {
                // Mode Test : sélection de 20 max
                questions = questions.slice(0, 20);
            }

            // Mélange des options pour chaque question
            questions = questions.map(q => {
                let opts = [...q.options];
                shuffleArray(opts);
                return { ...q, options: opts };
            });

            if (questions.length === 0) {
                alert("Aucune question trouvée pour cette sélection.");
                return;
            }

            state.filteredQuestions = questions;
            state.currentQuestionIndex = 0;
            state.userAnswers = {};
            state.showFeedback = false;
            state.trainingStats = { answered: 0, correct: 0 };
            state.view = mode;
            
            if (mode === 'challenge') {
                state.challengeStartTime = Date.now();
                startChallengeTimer();
            }
            
            saveState();
            render();
            triggerAnimation();
        }

        function handleAnswer(encodedAnswer) {
            if (state.userAnswers[state.currentQuestionIndex]) return; // Déjà répondu
            
            const answer = decodeURIComponent(encodedAnswer);
            state.userAnswers[state.currentQuestionIndex] = answer;
            
            const q = state.filteredQuestions[state.currentQuestionIndex];
            
            if (state.view === 'training') {
                state.trainingStats.answered++;
                if (answer === q.reponse) {
                    state.trainingStats.correct++;
                }
                state.showFeedback = true;
                saveState();
                render();
            } else {
                saveState();
                render(); // Affiche la sélection en bleu
                // Passage automatique à la question suivante en mode test
                setTimeout(() => {
                    nextQuestion();
                }, 400);
            }
        }

        function nextQuestion() {
            if (state.view === 'training') {
                state.currentQuestionIndex++;
                if (state.currentQuestionIndex >= state.filteredQuestions.length) {
                    // Remélanger les questions quand on arrive à la fin
                    shuffleArray(state.filteredQuestions);
                    // Remélanger les options pour chaque question
                    state.filteredQuestions = state.filteredQuestions.map(q => {
                        let opts = [...q.options];
                        shuffleArray(opts);
                        return { ...q, options: opts };
                    });
                    state.currentQuestionIndex = 0;
                }
                // Nettoyer la réponse pour la nouvelle question
                delete state.userAnswers[state.currentQuestionIndex];
                state.showFeedback = false;
                saveState();
                render();
                triggerAnimation();
            } else {
                if (state.currentQuestionIndex < state.filteredQuestions.length - 1) {
                    state.currentQuestionIndex++;
                    state.showFeedback = false;
                    saveState();
                    render();
                    triggerAnimation();
                } else {
                    if (state.view === 'challenge') {
                        if (timerInterval) clearInterval(timerInterval);
                        state.challengeEndTime = Date.now();
                        state.challengeTime = state.challengeEndTime - state.challengeStartTime;
                        
                        let score = 0;
                        state.filteredQuestions.forEach((q, idx) => {
                            if (state.userAnswers[idx] === q.reponse) score++;
                        });
                        state.currentScore = score;
                        
                        if (score === state.filteredQuestions.length) {
                            state.view = 'challenge_form';
                        } else {
                            state.view = 'high_scores';
                        }
                    } else {
                        state.view = 'results';
                    }
                    saveState();
                    render();
                    triggerAnimation();
                }
            }
        }

        function quitQuiz() {
            if (state.view === 'training' && state.trainingStats.answered > 0) {
                state.view = 'training_results';
                saveState();
                render();
                triggerAnimation();
            } else {
                resetQuiz();
            }
        }

        function resetQuiz() {
            if (timerInterval) clearInterval(timerInterval);
            state.view = 'home';
            state.quizMode = null;
            state.currentQuestionIndex = 0;
            state.userAnswers = {};
            state.showFeedback = false;
            state.trainingStats = { answered: 0, correct: 0 };
            state.currentScore = null;
            state.lastChallengeEntry = null;
            sessionStorage.removeItem('quizy_state');
            render();
            triggerAnimation();
        }

        // --- RENDU DE L'INTERFACE (VUES) ---
        window.render = function render() {
            const app = document.getElementById('app');
            const quitBtn = document.getElementById('quit-btn');
            
            if (state.view === 'home') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderHome();
            } else if (state.view === 'challenge_intro') {
                quitBtn.classList.remove('hidden');
                app.innerHTML = renderChallengeIntro();
            } else if (state.view === 'training' || state.view === 'test' || state.view === 'challenge') {
                quitBtn.classList.remove('hidden');
                app.innerHTML = renderQuiz();
            } else if (state.view === 'results') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderResults();
            } else if (state.view === 'training_results') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderTrainingResults();
            } else if (state.view === 'challenge_form') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderChallengeForm();
            } else if (state.view === 'high_scores') {
                quitBtn.classList.add('hidden');
                app.innerHTML = renderHighScores();
            }
            
            // Initialiser les icônes Lucide après chaque mise à jour du DOM
            lucide.createIcons();
        }

        function renderHome() {
            const files = [
                { value: 'anatomie.json', label: 'Anatomie' },
                { value: 'physiologie.json', label: 'Physiologie' },
                { value: 'nutrition.json', label: 'Nutrition' }

            const q = state.filteredQuestions[state.currentQuestionIndex];

            let progressHtml = '';

            } else {
                const progress = ((state.currentQuestionIndex + 1) / state.filteredQuestions.length) * 100;
                questionCounterHtml = `<span class="text-sm font-bold text-encp-dark bg-gray-100 px-3 py-1 rounded-full">Question ${state.currentQuestionIndex + 1} / ${state.filteredQuestions.length}</span>`;

                    <div class="bg-encp-orange h-full rounded-full transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                </div>`;
            }
            
            let optionsHtml = q.options.map((opt) => {
                let btnClass = "w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 flex items-center justify-between font-medium ";
                let iconHtml = '';
                
                if (isTraining && isAnswered) {
                    if (opt === q.reponse) {
                        btnClass += "border-green-500 bg-green-50 text-green-900 shadow-sm";
                        iconHtml = `<i data-lucide="check-circle-2" class="text-green-500 w-6 h-6 ml-4 shrink-0"></i>`;
                    } else if (opt === userAnswer) {
                        btnClass += "border-red-500 bg-red-50 text-red-900 shadow-sm";
                        iconHtml = `<i data-lucide="x-circle" class="text-red-500 w-6 h-6 ml-4 shrink-0"></i>`;
                    } else {
                        btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-60";
                    }
                } else if (!isTraining && isAnswered && opt === userAnswer) {
                    btnClass += "border-encp-orange bg-orange-50 text-encp-orange shadow-sm";
                    iconHtml = `<i data-lucide="check-circle-2" class="text-encp-orange w-6 h-6 ml-4 shrink-0"></i>`;

                    btnClass += "border-gray-200 hover:border-encp-orange hover:bg-orange-50 text-gray-700 cursor-pointer hover:shadow-md";

                const safeOpt = encodeURIComponent(opt).replace(/'/g, "%27");
                
                return `

                            ` : `
                            <button onclick="startQuiz('${state.quizMode || 'test'}')" class="inline-flex items-center justify-center gap-2 sm:gap-3 bg-encp-orange text-white px-6 sm:px-8 py-3 sm:py-4 rounded-2xl font-extrabold hover:bg-[#c95000] transition-all shadow-xl hover:-translate-y-1 text-base sm:text-lg w-full sm:w-auto">
                                <i data-lucide="rotate-cw" class="w-5 h-5 sm:w-6 sm:h-6"></i> Recommencer
                            </button>
                            `}
                            <button onclick="resetQuiz()" class="inline-flex items-center justify-center gap-2 sm:gap-3 bg-white text-encp-dark px-6 sm:px-8 py-3 sm:py-4 rounded-2xl font-extrabold hover:bg-gray-100 transition-all shadow-xl hover:-translate-y-1 text-base sm:text-lg w-full sm:w-auto">
                                <i data-lucide="home" class="w-5 h-5 sm:w-6 sm:h-6"></i> Accueil
                            </button>
                        </div>
                    </div>
                </div>
                <div class="space-y-6 sm:space-y-8">
                    <h3 class="text-2xl sm:text-3xl font-extrabold text-encp-dark px-2 tracking-tight">Correction détaillée</h3>
                    ${correctionsHtml}
                </div>
            </div>
            `;
        }

        function renderTrainingResults() {
            const answered = state.trainingStats.answered;
            const correct = state.trainingStats.correct;
            const incorrect = answered - correct;
            const percentage = Math.round((correct / answered) * 100) || 0;

            return `
            <div class="max-w-4xl mx-auto">
                <div class="bg-encp-dark rounded-3xl shadow-2xl overflow-hidden mb-6 sm:mb-10 text-center p-6 sm:p-12 relative">
                    <!-- Decorative circles -->
                    <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full border-4 border-white/5"></div>
                    <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full border-4 border-white/5"></div>
                    
                    <div class="relative z-10">
                        <div class="inline-flex items-center justify-center w-16 h-16 sm:w-24 sm:h-24 bg-encp-orange text-white rounded-full mb-4 sm:mb-6 shadow-lg shadow-encp-orange/40">
                            <i data-lucide="bar-chart-2" class="w-8 h-8 sm:w-12 sm:h-12"></i>
                        </div>
                        <h2 class="text-3xl sm:text-4xl font-extrabold text-white mb-2 sm:mb-3 tracking-tight">Rapport d'entraînement</h2>
                        <p class="text-encp-lightpink text-base sm:text-lg mb-6 sm:mb-10">Voici le résumé de votre session d'entraînement.</p>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6 mb-8 sm:mb-12 max-w-3xl mx-auto">
                            <div class="bg-white/10 p-4 sm:p-6 rounded-3xl backdrop-blur-sm">
                                <div class="text-3xl sm:text-4xl font-black text-white mb-1 sm:mb-2">${answered}</div>
                                <div class="text-[10px] sm:text-xs font-bold text-encp-lightpink uppercase tracking-widest">Questions</div>
                            </div>
                            <div class="bg-white/10 p-4 sm:p-6 rounded-3xl backdrop-blur-sm">
                                <div class="text-3xl sm:text-4xl font-black text-green-400 mb-1 sm:mb-2">${correct}</div>
                                <div class="text-[10px] sm:text-xs font-bold text-green-200 uppercase tracking-widest">Réussites</div>
                            </div>
                            <div class="bg-white/10 p-4 sm:p-6 rounded-3xl backdrop-blur-sm">
                                <div class="text-3xl sm:text-4xl font-black text-red-400 mb-1 sm:mb-2">${incorrect}</div>
                                <div class="text-[10px] sm:text-xs font-bold text-red-200 uppercase tracking-widest">Échecs</div>
                            </div>
                            <div class="bg-white/10 p-4 sm:p-6 rounded-3xl backdrop-blur-sm">
                                <div class="text-3xl sm:text-4xl font-black text-encp-orange mb-1 sm:mb-2">${percentage}%</div>
                                <div class="text-[10px] sm:text-xs font-bold text-orange-200 uppercase tracking-widest">Précision</div>
                            </div>
                        </div>
                        <button onclick="resetQuiz()" class="inline-flex items-center gap-2 sm:gap-3 bg-white text-encp-dark px-6 sm:px-10 py-3 sm:py-5 rounded-2xl font-extrabold hover:bg-gray-100 transition-all shadow-xl hover:-translate-y-1 text-base sm:text-lg w-full sm:w-auto justify-center">
                            <i data-lucide="home" class="w-5 h-5 sm:w-6 sm:h-6"></i> Quitter le rapport
                        </button>
                    </div>
                </div>
            </div>
            `;
        }

        function showHighScores() {
            state.view = 'high_scores';
            state.currentScore = null;
            saveState();
            render();
            triggerAnimation();
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}m ${seconds}s`;
        }

        function getHighScores() {
            return window.firebaseHighScores || {};
        }

        async function submitChallenge(event) {
            event.preventDefault();
            const prenom = document.getElementById('c-prenom').value;
            const promo = document.getElementById('c-promo').value;
            const ville = document.getElementById('c-ville').value;
            
            const submitBtn = document.getElementById('submit-challenge-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
            lucide.createIcons();
            
            const entry = {
                subject: state.selectedFile,
                prenom,
                promo,
                ville,
                time: state.challengeTime,
                date: new Date().toISOString()
            };
            
            if (window.submitFirebaseScore) {
                await window.submitFirebaseScore(entry);
                // On utilise le prénom et le temps comme identifiant temporaire pour le surlignage
                state.lastChallengeEntry = entry.prenom + '_' + entry.time;
            }
            
            state.view = 'high_scores';
            saveState();
            render();
            triggerAnimation();
        }

        function renderChallengeForm() {
            return `
            <div class="max-w-xl mx-auto">
                <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8 md:p-10 border border-gray-100 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 bg-green-100 text-green-500 rounded-full mb-4 sm:mb-6">
                        <i data-lucide="check-circle" class="w-8 h-8 sm:w-10 sm:h-10"></i>
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-extrabold text-encp-dark mb-2">Incroyable ! 20/20 !</h2>
                    <p class="text-sm sm:text-base text-gray-600 mb-6 sm:mb-8">Vous avez terminé en <strong class="text-encp-orange">${formatTime(state.challengeTime)}</strong>. Entrez vos informations pour le classement.</p>
                    
                    <form id="challenge-form" onsubmit="submitChallenge(event)" class="space-y-4 text-left">
                        <div>
                            <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1">Prénom</label>
                            <input type="text" id="c-prenom" required class="w-full p-2.5 sm:p-3 border-2 border-gray-200 rounded-xl focus:border-encp-orange outline-none transition-colors text-sm sm:text-base">
                        </div>
                        <div>
                            <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1">Promo</label>
                            <input type="text" id="c-promo" required class="w-full p-2.5 sm:p-3 border-2 border-gray-200 rounded-xl focus:border-encp-orange outline-none transition-colors text-sm sm:text-base">
                        </div>
                        <div>
                            <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1">Ville du campus</label>
                            <input type="text" id="c-ville" required class="w-full p-2.5 sm:p-3 border-2 border-gray-200 rounded-xl focus:border-encp-orange outline-none transition-colors text-sm sm:text-base">
                        </div>
                        <button type="submit" id="submit-challenge-btn" class="w-full bg-encp-orange text-white font-bold py-3 sm:py-4 rounded-xl hover:bg-[#c95000] transition-colors mt-4 shadow-lg disabled:opacity-70 text-sm sm:text-base">
                            Enregistrer mon score
                        </button>
                    </form>
                </div>
            </div>
            `;
        }

        function renderHighScores() {
            const scores = getHighScores();
            const currentSubjectScores = scores[state.selectedFile] || [];
            
            let messageHtml = '';
            let correctionBtnHtml = '';
            let restartBtnHtml = '';
            
            if (state.currentScore !== null) {
                if (state.currentScore === state.filteredQuestions.length) {
                    messageHtml = `<div class="bg-green-100 text-green-800 p-3 sm:p-4 rounded-xl mb-4 sm:mb-6 font-bold text-center text-sm sm:text-base">Votre score a été enregistré !</div>`;
                } else {
                    messageHtml = `<div class="bg-orange-100 text-orange-800 p-3 sm:p-4 rounded-xl mb-4 sm:mb-6 font-bold text-center text-sm sm:text-base">Vous avez obtenu ${state.currentScore}/${state.filteredQuestions.length}. Il faut 20/20 pour entrer dans le classement !</div>`;
                    correctionBtnHtml = `
                        <button onclick="state.view = 'results'; render(); triggerAnimation();" class="w-full mb-3 sm:mb-4 flex items-center justify-center gap-2 bg-encp-darkpink text-white px-4 sm:px-6 py-3 rounded-xl font-bold hover:bg-[#a03a50] transition-colors text-sm sm:text-base">
                            <i data-lucide="file-check-2" class="w-4 h-4 sm:w-5 sm:h-5"></i> Voir la correction du quiz
                        </button>
                    `;
                }
                restartBtnHtml = `
                    <button onclick="prepareChallenge()" class="w-full mb-3 sm:mb-4 flex items-center justify-center gap-2 bg-encp-orange text-white px-4 sm:px-6 py-3 rounded-xl font-bold hover:bg-[#c95000] transition-colors text-sm sm:text-base">
                        <i data-lucide="rotate-cw" class="w-4 h-4 sm:w-5 sm:h-5"></i> Recommencer le challenge
                    </button>
                `;
            }
            
            const files = [
                { value: 'anatomie.json', label: 'Anatomie' },
                { value: 'physiologie.json', label: 'Physiologie' },
                { value: 'nutrition.json', label: 'Nutrition' }
            ];
            
            const tabsHtml = files.map(f => `
                <button onclick="state.selectedFile = '${f.value}'; render();" class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-lg transition-colors ${state.selectedFile === f.value ? 'bg-encp-dark text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
                    ${f.label}
                </button>
            `).join('');

            let tableHtml = '';
            if (currentSubjectScores.length === 0) {
                tableHtml = `<div class="text-center text-gray-500 py-8">Aucun score pour le moment. Soyez le premier !</div>`;
            } else {
                const top10 = currentSubjectScores.slice(0, 10);
                let userRank = -1;
                
                if (state.lastChallengeEntry) {
                    userRank = currentSubjectScores.findIndex(s => (s.prenom + '_' + s.time) === state.lastChallengeEntry) + 1;
                }

                tableHtml = `
                <div class="overflow-x-auto rounded-xl border border-gray-200">
                    <table class="w-full text-left border-collapse min-w-[300px]">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-[10px] sm:text-xs uppercase tracking-wider">
                                <th class="p-2 sm:p-4 font-bold text-center sm:text-left w-10 sm:w-auto">#</th>
                                <th class="p-2 sm:p-4 font-bold">Joueur</th>
                                <th class="hidden sm:table-cell p-4 font-bold">Campus</th>
                                <th class="p-2 sm:p-4 font-bold text-right">Temps</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            ${top10.map((s, idx) => {
                                const isUser = (s.prenom + '_' + s.time) === state.lastChallengeEntry;
                                let rankBadge = `${idx + 1}`;
                                if (idx === 0) rankBadge = `<span class="text-yellow-500"><i data-lucide="trophy" class="w-4 h-4 sm:w-5 sm:h-5 inline"></i></span>`;
                                else if (idx === 1) rankBadge = `<span class="text-gray-400"><i data-lucide="medal" class="w-4 h-4 sm:w-5 sm:h-5 inline"></i></span>`;
                                else if (idx === 2) rankBadge = `<span class="text-amber-600"><i data-lucide="medal" class="w-4 h-4 sm:w-5 sm:h-5 inline"></i></span>`;
                                
                                return `
                                <tr class="${isUser ? 'bg-encp-lightpink/30' : 'bg-white'}">
                                    <td class="p-2 sm:p-4 font-bold text-gray-700 text-center sm:text-left text-sm sm:text-base">${rankBadge}</td>
                                    <td class="p-2 sm:p-4">
                                        <div class="font-bold text-encp-dark text-sm sm:text-base">${s.prenom}</div>
                                        <div class="text-[10px] sm:text-xs text-gray-500">Promo ${s.promo} <span class="sm:hidden">• ${s.ville}</span></div>
                                    </td>
                                    <td class="hidden sm:table-cell p-4 text-sm text-gray-600">${s.ville}</td>
                                    <td class="p-2 sm:p-4 text-right font-mono font-bold text-encp-orange text-xs sm:text-base whitespace-nowrap">${formatTime(s.time)}</td>
                                </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                `;
                
                if (userRank > 10) {
                    const s = currentSubjectScores[userRank - 1];
                    tableHtml += `
                    <div class="mt-4 p-3 sm:p-4 bg-encp-lightpink/30 rounded-xl border border-encp-lightpink flex justify-between items-center">
                        <div class="flex items-center gap-3 sm:gap-4">
                            <div class="font-bold text-gray-700 text-sm sm:text-base">#${userRank}</div>
                            <div>
                                <div class="font-bold text-encp-dark text-sm sm:text-base">${s.prenom}</div>
                                <div class="text-[10px] sm:text-xs text-gray-500">Promo ${s.promo}</div>
                            </div>
                        </div>
                        <div class="font-mono font-bold text-encp-orange text-xs sm:text-base">${formatTime(s.time)}</div>
                    </div>
                    `;
                }
            }

            return `
            <div class="max-w-3xl mx-auto">
                <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8 md:p-10 border border-gray-100">
                    <div class="flex items-center justify-center gap-2 sm:gap-3 mb-6 sm:mb-8">
                        <i data-lucide="trophy" class="w-6 h-6 sm:w-8 sm:h-8 text-encp-orange"></i>
                        <h2 class="text-2xl sm:text-3xl font-extrabold text-encp-dark">High Scores</h2>
                    </div>
                    
                    ${messageHtml}
                    
                    <div class="flex flex-wrap gap-2 justify-center mb-6">
                        ${tabsHtml}
                    </div>
                    
                    ${tableHtml}
                    
                    <div class="mt-6 sm:mt-8">
                        ${correctionBtnHtml}
                        ${restartBtnHtml}
                        <button onclick="resetQuiz()" class="w-full flex items-center justify-center gap-2 bg-gray-100 text-gray-700 px-6 py-3 rounded-xl font-bold hover:bg-gray-200 transition-colors text-sm sm:text-base">
                            <i data-lucide="home" class="w-4 h-4 sm:w-5 sm:h-5"></i> Retour à l'accueil
                        </button>
                    </div>
                </div>
            </div>
            `;
        }

        // --- DÉMARRAGE ---
        window.onload = async () => {
            loadState();
            await loadData();
            triggerAnimation();
        };
    </script>
</body>
</html>
